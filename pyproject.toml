[project]
name = "rtsp-recorder"
version = "0.1.0"
description = "Daemon that records one or more RTSP streams to rotating 1-minute files, with a web UI."
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "pydantic>=2.9",
    "numpy>=1.26",
]

[project.scripts]
rtsp-recorder = "rtsp_recorder.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rtsp_recorder"]
# The built UI lives in src/rtsp_recorder/static but is VCS-ignored (it's
# generated by the frontend build). `artifacts` re-includes it in the normal
# package selection so it's bundled once, at rtsp_recorder/static/. A
# force-include here would instead add a *second* copy whenever the files are
# already selected (e.g. Docker builds with no .git, where VCS-ignore can't
# exclude them), which hatchling rejects as a duplicate archive path.
artifacts = ["src/rtsp_recorder/static/**/*"]
